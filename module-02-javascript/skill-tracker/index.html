<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skill Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <header class="header">
            <h1 class="header__title">Skill Tracker</h1>
            <p class="header__sub">Track your tech skills</p>
        </header>

        <div class="input-section">
            <input type="text" id="skill-input" class="input" placeholder="Enter a skill e.g. Angular" maxlength="30" />
            <button id="add-btn" class="btn">Add Skill</button>
        </div>

        <div class="stats">
            <span id="skill-count">0</span> skills tracked
        </div>

        <div id="skill-grid" class="skill-grid">
            <p id="empty-msg" class="empty-msg">No skills added yet. Start adding above.</p>
        </div>
    </div>
    <script src="app.js"></script>
</body>

</html>
