<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Developer Profile Card</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container">
        <div class="card">
            <div class="card__avatar">DK</div>
            <div class="card__body">
                <h1 class="card__name">Damanpreet Kaur Bharaj</h1>
                <p class="card__role">Senior Full Stack Developer</p>
                <p class="card__location">Oranienburg, Germany</p>
                <div class="card__skills">
                    <span class="skill">Angular</span>
                    <span class="skill">Node.js</span>
                    <span class="skill">TypeScript</span>
                    <span class="skill">PHP</span>
                    <span class="skill">MongoDB</span>
                </div>
                <div class="card__links">
                    <a href="https://github.com/damanpreet-kaur-bharaj" class="btn">GitHub</a>
                    <a href="https://damanpreet-kaur-bharaj.github.io" class="btn btn--outline">Portfolio</a>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
